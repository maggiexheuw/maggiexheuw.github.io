# Site settings
title: "Maggie's Quantum Odyssey"
SEOTitle: Physics
header-img: img/desktop.jpg
email: mastermaggie@outlook.com
description: "Every failure is leading towards success."
keyword: "Physics, Condensed Physics，Group theory"
url: "http://maggiexheuw.github.io"          # your host, for absolute URL
baseurl: ""      # for example, '/blog' if your blog hosted on 'host/blog'
github_repo: "https://github.com/maggiexheuw/maggiexheuw.github.io.git" # you code repository



# Sidebar settings
sidebar: true                           # whether or not using Sidebar.
sidebar-about-description: "Through the lens of mathematics, I watch the universe unfold. Every equation tells a story; every story, a glimpse of the infinite."
sidebar-avatar: /img/Witten.jpg      # use absolute URL, seeing it's used in both `/` and `/about/`



# SNS settings
